                    hip_negative_tests_path: {

                    },
                    hip_follow_up_status: {
                        question: "Symptoms persist?",

            ankle: {

                    ankle_severe_path: {

                    ankle_follow_up_status: {
                        question: "Symptoms Persist?",

                            { text: "Mostly Resolved", next: "ankle_mostly_resolved", soap: "Follow-up evaluation: Mostly Resolved." }
                        ]
                    },
                    ankle_symptoms_persist: {
                        question: "Persistent Symptoms Protocol.",
                        type: "endpoint",
                        tools: ["peaceProtocol", "ankleProfiles", "analgesics", "weightBearing"],
                        assessment: "Acute Ankle Pain, persistent symptoms.",
                        consults: "Physical Therapy, Podiatry, Sports Medicine, or Orthopedics (7-10 days)",
                        plan: "• Consider X-Rays Anterior/Posterior, Lateral, Mortise\n• Profile Moderate\n• Consider crutches (Weight Bearing As Tolerated) if antalgic gait\n• Analgesic medications as needed\n• Range of Motion/Stretching, Brace if instability complained of\n• Referral: 7-10 days to Physical Therapy, Podiatry, Sports Medicine, or Orthopedics as indicated"
                    },
                    ankle_mostly_resolved: {
                        question: "Resolved Symptoms Protocol.",
                        type: "endpoint",
                        tools: ["analgesics"],
                        assessment: "Acute Ankle Pain, mostly resolved.",
                        consults: "None immediately required",
                        plan: "• Duty Specific Profile as needed\n• Analgesic Medications as needed\n• Return to duty at end of profile anticipated"
                    }
                }
            },
            leg: {
                title: "Traumatic or Acute Leg Pain",
                nodes: {
                    visit_type: {
                        question: "Patient Reports With Traumatic or Acute Leg Pain: Select the reason for today's encounter.",
                        options: [
                            { text: "Initial Consult (New Injury / Acute)", onSelect: () => { isFollowUp = false; }, next: "leg_red_flags", soap: "Visit Type: Initial Consult for traumatic or acute leg pain." },
                            { text: "Follow-Up (Reviewing Pending Imaging)", onSelect: () => { isFollowUp = false; }, next: "leg_review_results", soap: "Visit Type: Follow-Up to review pending leg imaging." },
                            { text: "Follow-Up (7-10 Day Re-evaluation)", onSelect: () => { isFollowUp = true; }, next: "leg_red_flags", soap: "Visit Type: 7-10 Day Follow-Up for previous leg injury." }
                        ]
                    },
                    leg_red_flags: {
                        question: "RED FLAGS: Does the patient have any Red Flags?",
                        tools: ["legRedFlags"],
                        options: [
                            { text: "Yes", next: "leg_red_flags_action", soap: "Evaluation performed. Positive for Leg Red Flags." },
                            { text: "No", next: "leg_exam", soap: "Evaluation performed. No Red Flags." }

                    },
                    leg_red_flags_action: {

                    leg_review_results: {

                            { text: "No, imaging is negative", next: "leg_exam", soap: "Imaging reviewed: No acute findings." }
                        ]
                    },
                    call_ortho_leg: {
                        question: "Consult Specialty Care TODAY.",
                        type: "endpoint",
                        assessment: "Acute Leg Pain with Positive Imaging Findings.",
                        consults: "Orthopedics or Emergency Department",
                        plan: "• Call Orthopedics (for fractures/stress fractures) or Emergency Department (for Deep Vein Thrombosis) TODAY to discuss management and transfer of care."
                    },
                    leg_exam: {
                        question: "EXAM Findings:",
                        instruction: "Assess for focal bone tenderness versus diffuse soft tissue tenderness. Perform Single Leg Hop Test.",
                        tools: ["legSpecialTests", "legProfiles"],
                        options: [
                            { text: "Yes (Focal bone tenderness OR positive/failed Single Leg Hop Test)", next: "leg_severe_path", soap: "Physical Exam: Positive for focal bone tenderness and/or failed Single Leg Hop Test (Suspect Bone Stress Injury)." },
                            { text: "No (Diffuse tenderness only, >5cm along bone, negative hop test)", next: "leg_moderate_path", soap: "Physical Exam: Diffuse medial tibial tenderness only, hop test negative (Suspect Medial Tibial Stress Syndrome / Shin Splints)." }
                        ]
                    },
                    leg_severe_path: {
                        question: "Initial Consult Complete: Suspected Stress Fracture Protocol.",
                        type: "endpoint",
                        tools: ["legImagingGuidelines", "legProfiles", "analgesics", "weightBearing"],
                        assessment: "Acute Leg Pain, suspected Tibial/Fibular Stress Fracture.",
                        consults: "Primary Care Manager or Sports Medicine in 7-10 days",
                        plan: "• Imaging: Order Anterior/Posterior and Lateral X-Rays. If negative, consider Magnetic Resonance Imaging (MRI).\n• Profile: Severe.\n• Crutches: Issued (Toe Touch Weight Bearing or Partial Weight Bearing based on pain).\n• Analgesic Medications as needed.\n• Re-evaluate in 7-10 days to review imaging and adjust weight bearing status."
                    },
                    leg_moderate_path: {
                        question: "Initial Consult Complete: Medial Tibial Stress Syndrome (Shin Splints) / Muscle Strain Protocol.",
                        type: "endpoint",
                        tools: ["peaceProtocol", "legProfiles", "analgesics"],
                        assessment: "Acute Leg Pain, suspected Medial Tibial Stress Syndrome or Muscle Strain.",
                        consults: "Primary Care Manager or Physical Therapy in 2-3 weeks",
                        plan: "• Profile: Moderate (Walk to tolerance, no running/jumping/rucking).\n• Analgesic Medications as needed.\n• PEACE Protocol.\n• Recommend cross-training (swimming, stationary bike).\n• Re-evaluate in 2-3 weeks if symptoms do not improve."
                    },
                    leg_follow_up_status: {
                        question: "Symptoms Persist?",
                        options: [
                            { text: "Yes", next: "leg_symptoms_persist", soap: "Follow-up evaluation: Symptoms Persist." },
                            { text: "Mostly Resolved", next: "leg_mostly_resolved", soap: "Follow-up evaluation: Mostly Resolved." }
                        ]
                    },
                    leg_symptoms_persist: {
                        question: "Persistent Symptoms Protocol.",
                        type: "endpoint",
                        tools: ["legImagingGuidelines", "legProfiles", "analgesics", "weightBearing"],
                        assessment: "Acute Leg Pain, persistent symptoms.",
                        consults: "Physical Therapy, Sports Medicine, or Orthopedics",
                        plan: "• Imaging: If X-Rays were negative previously, order Magnetic Resonance Imaging (MRI) now.\n• Profile: Maintain Moderate or Severe Profile based on symptom severity.\n• Consider crutches if gait remains antalgic.\n• Analgesic medications as needed.\n• Referral: Physical Therapy, Sports Medicine, or Orthopedics as indicated."
                    },
                    leg_mostly_resolved: {
                        question: "Resolved Symptoms Protocol.",
                        type: "endpoint",
                        tools: ["analgesics"],
                        assessment: "Acute Leg Pain, mostly resolved.",
                        consults: "None immediately required",
                        plan: "• Duty Specific Profile as needed (Gradual return to running program recommended).\n• Analgesic Medications as needed.\n• Return to duty at end of profile anticipated."
                    }
                }
            }
        };

        // --- STATE MANAGEMENT ---
        let currentProtocol = null;
        let currentNodeId = null;
        let clinicalHistory = []; // Stores SOAP lines
        let isFollowUp = false; 

        // --- UI RENDERING ---
        function renderHome() {
            const root = document.getElementById('app-root');
            root.innerHTML = `
                <div class="slide-in">
                    <h2 class="text-2xl font-bold mb-6 border-b pb-2 text-gray-800">Select Protocol</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        <button onclick="startProtocol('neck')" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:border-army hover:shadow-md transition text-left group">
                            <h3 class="text-lg font-bold text-army group-hover:text-army-dark"><i class="fa-solid fa-person-praying mr-2"></i> Neck Pain</h3>
                            <p class="text-sm text-gray-500 mt-2">Traumatic or Acute</p>
                        </button>
                        <button onclick="startProtocol('hip')" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:border-army hover:shadow-md transition text-left group">
                            <h3 class="text-lg font-bold text-army group-hover:text-army-dark"><i class="fa-solid fa-child-reaching mr-2"></i> Hip Pain</h3>
                            <p class="text-sm text-gray-500 mt-2">Traumatic or Acute</p>
                        </button>
                        <button onclick="startProtocol('ankle')" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:border-army hover:shadow-md transition text-left group">
                            <h3 class="text-lg font-bold text-army group-hover:text-army-dark"><i class="fa-solid fa-shoe-prints mr-2"></i> Ankle Pain</h3>
                            <p class="text-sm text-gray-500 mt-2">Traumatic or Acute</p>
                        </button>
                        <button onclick="startProtocol('leg')" class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 hover:border-army hover:shadow-md transition text-left group">
                            <h3 class="text-lg font-bold text-army group-hover:text-army-dark"><i class="fa-solid fa-person-walking mr-2"></i> Leg Pain</h3>
                            <p class="text-sm text-gray-500 mt-2">Traumatic or Acute</p>
                        </button>
                        <button disabled class="bg-gray-50 p-6 rounded-lg shadow-sm border border-gray-200 opacity-60 cursor-not-allowed text-left">
                            <h3 class="text-lg font-bold text-gray-600"><i class="fa-solid fa-staff-snake mr-2"></i> Knee Pain</h3>
                            <p class="text-sm text-gray-400 mt-2">Coming Soon</p>
                        </button>
                    </div>
                </div>
            `;
        }

        function startProtocol(protocolId) {
            currentProtocol = algorithms[protocolId];
            clinicalHistory = [];
            isFollowUp = false;
            
            clinicalHistory.push(`Chief Complaint: Patient presents with ${currentProtocol.title.toLowerCase()}.`);
            
            renderNode('visit_type');
        }

        function renderNode(nodeId) {
            currentNodeId = nodeId;
            const node = currentProtocol.nodes[nodeId];
            const root = document.getElementById('app-root');

            let toolsHtml = '';
            if (node.tools) {
                toolsHtml = '<div class="space-y-4 mb-6">';
                node.tools.forEach(toolId => {
                    const tool = clinicalTools[toolId];
                    if (tool) {
                        if (tool.collapsible === false) {
                            // Render Main Red Flags fully open
                            toolsHtml += `
                                <div class="bg-white border-2 border-red-200 rounded-lg shadow-sm">
                                    <div class="font-bold text-md p-3 bg-red-50 border-b border-red-200 text-red-800 flex items-center">
                                        <i class="fa-solid fa-triangle-exclamation mr-2 text-red-600"></i> ${tool.title}
                                    </div>
                                    <div class="p-4 bg-gray-50">
                                        ${tool.content}
                                    </div>
                                </div>
                            `;
                        } else {
                            // Render Expandable Dropdowns for Sub-References
                            toolsHtml += `
                                <details class="group bg-white border-2 border-blue-300 rounded-lg shadow-sm mb-2">
                                    <summary class="font-bold text-md p-3 bg-blue-50 text-blue-900 flex justify-between items-center rounded-lg hover:bg-blue-100 transition-colors cursor-pointer select-none">
                                        <div class="flex items-center">
                                            <i class="fa-solid fa-book-medical mr-2 text-blue-600"></i> 
                                            <span>Reference: ${tool.title} <span class="text-xs font-normal ml-2 text-blue-600">(Click to Expand)</span></span>
                                        </div>
                                        <i class="fa-solid fa-chevron-down transition-transform group-open:rotate-180 text-blue-600"></i>
                                    </summary>
                                    <div class="p-4 bg-gray-50 border-t border-blue-200 rounded-b-lg">
                                        ${tool.content}
                                    </div>
                                </details>
                            `;
                        }
                    }
                });
                toolsHtml += '</div>';
            }

            if (node.type === 'endpoint') {
                renderEndpoint(node, toolsHtml);
                return;
            }

            let optionsHtml = '<div class="space-y-3">';
            node.options.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="selectOption('${nodeId}', ${index})" class="w-full text-left bg-white p-4 rounded-lg border border-gray-300 shadow-sm hover:bg-army hover:text-white transition duration-150 font-medium text-gray-800">
                        ${opt.text}
                    </button>
                `;
            });
            optionsHtml += '</div>';

            const typeBadge = node.type === 'action' 
                ? '<span class="inline-block bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded font-bold uppercase tracking-wide mb-3"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Action Required</span>'
                : '';

            const instruction = node.instruction ? `<p class="text-md text-gray-600 mb-6 bg-blue-50 p-4 rounded border border-blue-100"><i class="fa-solid fa-clipboard-check text-blue-500 mr-2"></i> ${node.instruction}</p>` : '';

            root.innerHTML = `
                <div class="slide-in">
                    <button onclick="renderHome()" class="text-gray-500 hover:text-army mb-6 text-sm font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Protocols</button>
                    
                    <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-army mb-6">
                        ${typeBadge}
                        <h2 class="text-xl font-bold text-gray-900 mb-4">${node.question}</h2>
                        ${instruction}
                        ${toolsHtml}
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        function selectOption(nodeId, optionIndex) {
            const node = currentProtocol.nodes[nodeId];
            const option = node.options[optionIndex];
            
            if (option.onSelect) {
                option.onSelect();
            }

            if (option.soap) {
                clinicalHistory.push(option.soap);
            }
            
            const nextNodeId = typeof option.next === 'function' ? option.next() : option.next;
            renderNode(nextNodeId);
        }

        function renderEndpoint(node, toolsHtml) {
            const root = document.getElementById('app-root');
            
            const soapDate = new Date().toLocaleDateString();
            const subjective = clinicalHistory[0]; 
            const objective = clinicalHistory.slice(1).join(" ");
            const assessment = node.assessment || "Pending Provider Assessment";
            
            const recommendedConsult = node.consults || "appropriate specialty per protocol";
            const plan = (node.plan || "Follow up as needed.") + `\n\nCoordination:\n- Inform the clinic provider.\n- Recommended Consult: ${recommendedConsult}.`;

            const soapText = 
`DATE: ${soapDate}

S: ${subjective}

O: Algorithm path documented: ${objective}

A: ${assessment}

P: ${plan}
`;

            root.innerHTML = `
                <div class="slide-in">
                    <button onclick="renderHome()" class="text-gray-500 hover:text-army mb-4 text-sm font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Start Over</button>
                    
                    <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-red-700 mb-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-2"><i class="fa-solid fa-flag-checkered text-red-700 mr-2"></i> Endpoint Reached</h2>
                        <p class="text-gray-700 mb-4">${node.question}</p>
                        ${toolsHtml}
                    </div>

                    <div class="bg-gray-50 rounded-xl shadow-inner p-6 border border-gray-200 relative">
                        <div class="flex justify-between items-center mb-4 border-b border-gray-300 pb-2">
                            <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-file-medical mr-2"></i> Generated SOAP Note</h3>
                            <button onclick="copySoap()" id="copyBtn" class="bg-army text-white px-3 py-1.5 rounded text-sm hover:bg-army-dark transition flex items-center">
                                <i class="fa-regular fa-copy mr-1"></i> Copy to Clipboard
                            </button>
                        </div>
                        <pre id="soapContent" class="whitespace-pre-wrap font-mono text-sm text-gray-800 bg-white p-4 border border-gray-200 rounded">${soapText}</pre>
                    </div>
                </div>
            `;
        }

        function copySoap() {
            const soapContent = document.getElementById('soapContent').innerText;
            navigator.clipboard.writeText(soapContent).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Copied!';
                btn.classList.add('bg-green-600');
                btn.classList.remove('bg-army');
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.remove('bg-green-600');
                    btn.classList.add('bg-army');
                }, 2000);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = soapContent;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const btn = document.getElementById('copyBtn');
                    btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Copied!';
                } catch (err) {
                    alert('Failed to copy text. Please select and copy manually.');
                }
                document.body.removeChild(textArea);
            });
        }

        renderHome();
    </script>
