                        </button>
                    </div>

                    <div class="mt-8 border-t border-gray-200 pt-6">
                        <button onclick="renderReferences()" class="w-full bg-white p-4 rounded-lg shadow-sm border border-gray-300 hover:border-army hover:shadow-md transition text-center group flex items-center justify-center">
                            <i class="fa-solid fa-book-journal-whills text-army-gold text-xl mr-3 group-hover:scale-110 transition-transform"></i>
                            <span class="text-lg font-bold text-gray-800 group-hover:text-army">View All Clinical References</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function renderReferences() {
            const root = document.getElementById('app-root');
            let contentHtml = '<div class="space-y-4">';

            const bodyParts = [
                { id: 'overall', title: 'Overall Tool' },
                { id: 'neck', title: 'Neck' },
                { id: 'shoulder', title: 'Shoulder' },
                { id: 'elbow', title: 'Arm & Elbow' },
                { id: 'wrist', title: 'Wrist & Hand' },
                { id: 'hip', title: 'Hip' },
                { id: 'leg', title: 'Leg' },
                { id: 'knee', title: 'Knee' },
                { id: 'ankle', title: 'Ankle' }
            ];

            bodyParts.forEach(part => {
                const refs = bibliographicReferences[part.id];
                if (refs && refs.length > 0) {
                    let listHtml = '<ul class="list-decimal pl-5 space-y-3 text-sm text-gray-700">';
                    refs.forEach(ref => {
                        listHtml += `<li>${ref}</li>`;
                    });
                    listHtml += '</ul>';

                    contentHtml += `
                        <details class="group bg-white border border-gray-300 rounded-lg shadow-sm">
                            <summary class="font-bold text-md p-4 bg-gray-50 text-army flex justify-between items-center rounded-lg hover:bg-gray-100 transition-colors cursor-pointer select-none">
                                <div class="flex items-center">
                                    <i class="fa-solid fa-book-bookmark mr-2 text-army-gold"></i> 
                                    <span>${part.title} References</span>
                                </div>
                                <i class="fa-solid fa-chevron-down transition-transform group-open:rotate-180 text-gray-500"></i>
                            </summary>
                            <div class="p-5 border-t border-gray-200">
                                ${listHtml}
                            </div>
                        </details>
                    `;
                }
            });

            contentHtml += '</div>';

            root.innerHTML = `
                <div class="slide-in">
                    <button onclick="renderHome()" class="text-gray-500 hover:text-army mb-6 text-sm font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Protocols</button>
                    
                    <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-army mb-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-2"><i class="fa-solid fa-book-journal-whills text-army-gold mr-2"></i> Clinical References & Bibliography</h2>
                        <p class="text-gray-600 mb-6 text-sm border-b border-gray-200 pb-4">The following evidence-based references support the clinical pathways, decision rules, and special tests utilized within the MSK Screening and Referral Tools.</p>
                        ${contentHtml}
                    </div>
                </div>
            `;
        }

        function startProtocol(protocolId) {
            currentProtocol = algorithms[protocolId];
            clinicalHistory = [];
            isFollowUp = false;
            visitTypeState = 'initial';
            
            clinicalHistory.push(`Chief Complaint: Patient presents with ${currentProtocol.title.toLowerCase()}.`);
            
            renderNode('visit_type');
        }

        function renderNode(nodeId) {
            currentNodeId = nodeId;
            const node = currentProtocol.nodes[nodeId];
            const root = document.getElementById('app-root');

            let toolsHtml = '';
            if (node.tools) {
                toolsHtml = '<div class="space-y-4 mb-6">';
                node.tools.forEach(toolId => {
                    const tool = clinicalTools[toolId];
                    if (tool) {
                        if (tool.collapsible === false) {
                            // Render Main Red Flags fully open
                            toolsHtml += `
                                <div class="bg-white border-2 border-red-200 rounded-lg shadow-sm">
                                    <div class="font-bold text-md p-3 bg-red-50 border-b border-red-200 text-red-800 flex items-center">
                                        <i class="fa-solid fa-triangle-exclamation mr-2 text-red-600"></i> ${tool.title}
                                    </div>
                                    <div class="p-4 bg-gray-50">
                                        ${tool.content}
                                    </div>
                                </div>
                            `;
                        } else {
                            // Render Expandable Dropdowns for Sub-References
                            toolsHtml += `
                                <details class="group bg-white border-2 border-blue-300 rounded-lg shadow-sm mb-2">
                                    <summary class="font-bold text-md p-3 bg-blue-50 text-blue-900 flex justify-between items-center rounded-lg hover:bg-blue-100 transition-colors cursor-pointer select-none">
                                        <div class="flex items-center">
                                            <i class="fa-solid fa-book-medical mr-2 text-blue-600"></i> 
                                            <span>Reference: ${tool.title} <span class="text-xs font-normal ml-2 text-blue-600">(Click to Expand)</span></span>
                                        </div>
                                        <i class="fa-solid fa-chevron-down transition-transform group-open:rotate-180 text-blue-600"></i>
                                    </summary>
                                    <div class="p-4 bg-gray-50 border-t border-blue-200 rounded-b-lg">
                                        ${tool.content}
                                    </div>
                                </details>
                            `;
                        }
                    }
                });
                toolsHtml += '</div>';
            }

            if (node.type === 'endpoint') {
                renderEndpoint(node, toolsHtml);
                return;
            }

            let optionsHtml = '<div class="space-y-3">';
            node.options.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="selectOption('${nodeId}', ${index})" class="w-full text-left bg-white p-4 rounded-lg border border-gray-300 shadow-sm hover:bg-army hover:text-white transition duration-150 font-medium text-gray-800">
                        ${opt.text}
                    </button>
                `;
            });
            optionsHtml += '</div>';

            const typeBadge = node.type === 'action' 
                ? '<span class="inline-block bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded font-bold uppercase tracking-wide mb-3"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Action Required</span>'
                : '';

            const instruction = node.instruction ? `<p class="text-md text-gray-600 mb-6 bg-blue-50 p-4 rounded border border-blue-100"><i class="fa-solid fa-clipboard-check text-blue-500 mr-2"></i> ${node.instruction}</p>` : '';

            root.innerHTML = `
                <div class="slide-in">
                    <div class="flex items-center justify-between mb-6">
                        <button onclick="renderHome()" class="text-gray-500 hover:text-army text-sm font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Back to Protocols</button>
                        <h1 class="text-lg font-bold text-army-dark">${currentProtocol.title}</h1>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-army mb-6">
                        ${typeBadge}
                        <h2 class="text-xl font-bold text-gray-900 mb-4">${node.question}</h2>
                        ${instruction}
                        ${toolsHtml}
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        function selectOption(nodeId, optionIndex) {
            const node = currentProtocol.nodes[nodeId];
            const option = node.options[optionIndex];
            
            if (option.onSelect) {
                option.onSelect();
            }

            if (option.soap) {
                clinicalHistory.push(option.soap);
            }
            
            const nextNodeId = typeof option.next === 'function' ? option.next() : option.next;
            renderNode(nextNodeId);
        }

        function renderEndpoint(node, toolsHtml) {
            const root = document.getElementById('app-root');
            
            const soapDate = new Date().toLocaleDateString();
            const subjective = clinicalHistory[0]; 
            const objective = clinicalHistory.slice(1).join(" ");
            const assessment = node.assessment || "Pending Provider Assessment";
            
            const recommendedConsult = node.consults || "appropriate specialty per protocol";
            const plan = (node.plan || "Follow up as needed.") + `\n\nCoordination:\n- Inform the clinic provider.\n- Recommended Consult: ${recommendedConsult}.`;

            const soapText = 
`DATE: ${soapDate}

S: ${subjective}

O: Algorithm path documented: ${objective}

A: ${assessment}

P: ${plan}
`;

            root.innerHTML = `
                <div class="slide-in">
                    <div class="flex items-center justify-between mb-4">
                        <button onclick="renderHome()" class="text-gray-500 hover:text-army text-sm font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Start Over</button>
                        <h1 class="text-lg font-bold text-army-dark">${currentProtocol.title}</h1>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-red-700 mb-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-2"><i class="fa-solid fa-flag-checkered text-red-700 mr-2"></i> Endpoint Reached</h2>
                        <p class="text-gray-700 mb-4">${node.question}</p>
                        ${toolsHtml}
                    </div>

                    <div class="bg-gray-50 rounded-xl shadow-inner p-6 border border-gray-200 relative">
                        <div class="flex justify-between items-center mb-4 border-b border-gray-300 pb-2">
                            <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-file-medical mr-2"></i> Generated SOAP Note</h3>
                            <button onclick="copySoap()" id="copyBtn" class="bg-army text-white px-3 py-1.5 rounded text-sm hover:bg-army-dark transition flex items-center">
                                <i class="fa-regular fa-copy mr-1"></i> Copy to Clipboard
                            </button>
                        </div>
                        <pre id="soapContent" class="whitespace-pre-wrap font-mono text-sm text-gray-800 bg-white p-4 border border-gray-200 rounded">${soapText}</pre>
                    </div>
                </div>
            `;
        }

        function copySoap() {
            const soapContent = document.getElementById('soapContent').innerText;
            navigator.clipboard.writeText(soapContent).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Copied!';
                btn.classList.add('bg-green-600');
                btn.classList.remove('bg-army');
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.remove('bg-green-600');
                    btn.classList.add('bg-army');
                }, 2000);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = soapContent;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const btn = document.getElementById('copyBtn');
                    btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Copied!';
                } catch (err) {
                    alert('Failed to copy text. Please select and copy manually.');
                }
                document.body.removeChild(textArea);
            });
        }

        renderHome();
    </script>
</body>
</html>
